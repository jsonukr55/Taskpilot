<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TaskPilot — AI-Powered Task Management</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f14">
  <meta name="description" content="AI-powered personal execution system that manages your tasks automatically">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TaskPilot">
  <link rel="icon" type="image/svg+xml" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Prevent FOUC for dark mode -->
  <script>
    (function() {
      const saved = localStorage.getItem('theme') || 'system';
      const isDark = saved === 'dark' || (saved === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
    })();
  </script>
</head>
<body>
  <tp-root></tp-root>
</body>
</html>
